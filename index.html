<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relatório CGR - Canaã Telecom</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f4f4f4; }
    h1 { color: #1e3a8a; }
    table { width: 100%; border-collapse: collapse; margin: 20px 0; background: white; }
    th, td { padding: 12px; text-align: left; border: 1px solid #ddd; }
    th { background: #1e3a8a; color: white; }
    .status-em { background: #fef3c7; color: #854d0e; padding: 4px 8px; border-radius: 4px; }
    .status-res { background: #d1fae5; color: #065f46; padding: 4px 8px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>📊 Relatório CGR - Canaã Telecom</h1>
  <p><strong>Total de Ocorrências:</strong> <span id="total">0</span></p>

  <h2>Ocorrências Recentes</h2>
  <table id="tabela-ocorrencias">
    <thead>
      <tr>
        <th>Data</th>
        <th>Caixa</th>
        <th>Impacto</th>
        <th>Região</th>
        <th>RFO</th>
        <th>ETR</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    async function carregarRelatorio() {
      try {
        const response = await fetch('occurrences.json');
        const data = await response.json();
        const ocorrencias = data.occurrences || [];

        document.getElementById('total').textContent = ocorrencias.length;

        const tbody = document.querySelector('#tabela-ocorrencias tbody');
        tbody.innerHTML = '';

        ocorrencias.sort((a, b) => b.data.localeCompare(a.data));

        ocorrencias.forEach(occ => {
          const row = document.createElement('tr');
          const statusClass = occ.status === 'Resolvido' ? 'status-res' : 'status-em';
          
          row.innerHTML = `
            <td>${occ.data || '-'}</td>
            <td><strong>${occ.caixa || '-'}</strong></td>
            <td>${occ.impacto || '-'}</td>
            <td>${occ.regiao || '-'}</td>
            <td>${occ.rfo || '-'}</td>
            <td>${occ.etr || '-'}</td>
            <td><span class="${statusClass}">${occ.status}</span></td>
          `;
          tbody.appendChild(row);
        });

      } catch (error) {
        console.error("Erro ao carregar relatório:", error);
        document.body.innerHTML += '<p style="color:red;">Erro ao carregar dados. Verifique se occurrences.json existe.</p>';
      }
    }

    // Carrega ao abrir a página
    window.onload = carregarRelatorio;
  </script>
</body>
</html>
